# ============ 层次化主题 ============
hierarchy:

  AI编程工具:
    - Claude系列:
        keywords: ["Claude", "Claude Code", "CLAUDE.md", "Anthropic"]
    - Codex系列:
        keywords: ["Codex", "codex", "OpenAI"]
    - OpenClaw系列:
        keywords: ["OpenClaw", "openclaw"]
    - Agent框架:
        keywords: ["Agent", "agent", "多智能体", "智能体"]
    - Skill系统:
        keywords: ["Skill", "skill", "技能", "技能系统"]

  开源项目:
    - GitHub热门:
        keywords: ["GitHub", "star", "Star", "热门项目"]
    - 工具类:
        keywords: ["开源工具", "开源神器", "效率工具"]
    - 框架类:
        keywords: ["框架", "开源框架", "开发框架"]

  编程开发:
    - 后端开发:
        keywords: ["后端", "API", "数据库", "架构", "Python"]
    - 前端开发:
        keywords: ["前端", "React", "Vue", "JavaScript", "TypeScript"]
    - DevOps:
        keywords: ["部署", "CI/CD", "Docker", "K8s"]

# ============ 主题发现参数 ============
discovery:
  method: "hybrid"  # keyword / embedding / hybrid
  min_articles_per_topic: 3
  max_topics: 25
  enable_hierarchical: true

  # 向量聚类参数
  embedding_model: "paraphrase-multilingual-MiniLM-L12-v2"
  clustering_algorithm: "dbscan"  # kmeans / dbscan

  # 关键词匹配参数
  min_keyword_score: 1
  enable_dynamic_discovery: true

# ============ 去重配置 ============
deduplication:
  enabled: true
  method: "title_similarity"  # title_exact / title_similarity / content_hash
  similarity_threshold: 0.85  # 标题相似度阈值（0-1），降低以捕获更多相似文章

# ============ 分类优先级 ============
# 当文章匹配多个主题时，按此顺序选择
classification_priority:
  - "数据资产"      # 专业性强，优先
  - "Claude专题"    # 核心兴趣专题
  - "AI编程工具"    # 核心兴趣
  - "教程指南"      # 实用性高
  - "开源项目"
  - "编程开发"
  - "AI模型"
  - "AI应用"
  - "产品设计"
  - "工具软件"
  - "效率方法"
  - "自媒体"

